name: Build and Push to ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: repo
  ACCOUNT_ID: 225823724185

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 🔍 DEBUG (must add)
    - name: Verify AWS Identity
      run: aws sts get-caller-identity

    # 🔑 LOGIN (your manual method)
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-east-1 | \
        docker login --username AWS \
        --password-stdin 225823724185.dkr.ecr.us-east-1.amazonaws.com

    - name: Build Image
      run: docker build -t repo .

    - name: Tag Image
      run: |
        docker tag repo:latest \
        225823724185.dkr.ecr.us-east-1.amazonaws.com/repo:latest

    - name: Push Image
      run: |
        docker push 225823724185.dkr.ecr.us-east-1.amazonaws.com/repo:latest
